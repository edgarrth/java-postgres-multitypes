spring:
  application:
    name: axiz-payment-processing-postgres-poc
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/axiz_payments}
    username: ${DB_USERNAME:axiz}
    password: ${DB_PASSWORD:axiz_secret}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    pe.axiz: INFO

payment:
  events:
    listen-notify:
      enabled: ${PAYMENT_EVENTS_LISTEN_NOTIFY_ENABLED:true}
      channel: ${PAYMENT_EVENTS_LISTEN_NOTIFY_CHANNEL:payment_events}
      poll-timeout-millis: ${PAYMENT_EVENTS_LISTEN_NOTIFY_POLL_TIMEOUT_MILLIS:1000}
      reconnect-delay-millis: ${PAYMENT_EVENTS_LISTEN_NOTIFY_RECONNECT_DELAY_MILLIS:2000}
